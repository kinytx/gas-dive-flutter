name: mixer
description: 潜水气体填充 App（Flutter 版）
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # 共享算法（monorepo path 引用，未来可发到 pub.dev）
  dive_calc:
    path: ../../packages/dive_calc
  mixer_core:
    path: ../../packages/mixer_core

  # Material 风格图标
  cupertino_icons: ^1.0.8

  # P3.1: 本地历史记录
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.1
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/      # 未来加资源时取消注释
  # fonts:
  #   - family: ...
